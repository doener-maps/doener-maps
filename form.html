<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warteliste – Döner Match</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="waitlist-page">

    <div class="container">

        <div class="waitlist-layout">

            <!-- LEFT -->

            <div class="waitlist-content">

                <div class="logo">
                    <div class="logo-icon">D</div>
                    <span>Döner Match</span>
                </div>

                <h1>
                    Sag uns, wie deine perfekte
                    Döner-App aussehen soll.
                </h1>

                <p class="intro">
                    Trag dich ein und wir melden uns,
                    sobald die ersten Plätze für den
                    Testzugang frei werden.
                </p>

                <div class="info-box">

                    <div class="info-icon">
                        ♥
                    </div>

                    <div>
                        Frühe Tester:innen helfen uns,
                        die App wirklich dönerwürdig zu machen.
                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="form-card">

                <h2>Auf die Warteliste</h2>

                <form>

                    <div class="field">
                        <label>Email</label>
                        <input
                            type="email"
                            placeholder="deinname@mail.de"
                        >
                    </div>

                    <div class="field">
                        <label>Wie häufig isst du Döner?</label>
                        <input
                            type="text"
                            placeholder="z. B. einmal pro Woche"
                        >
                    </div>

                    <div class="field">
                        <label>
                            Was für Wünsche hast du für die App?
                        </label>

                        <textarea
                            placeholder="Erzähl uns, was Döner Match können muss..."
                        ></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        Absenden
                    </button>

                    <p class="note">
                        Nach dem Absenden weiter zur Bestätigung
                    </p>

                </form>

            </div>

        </div>

    </div>

</section>

</body>
</html>
